<style>
:root { color-scheme: light; --bg: #F9FAFB; --text: #1F2937; --muted: #6B7280; --border: #E5E7EB; --card: white; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 0; padding-bottom: env(safe-area-inset-bottom, 20px); -webkit-user-select: none; user-select: none; }
.container { max-width: 500px; margin: 0 auto; padding: 12px; }

/* Login */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 24px; }
.login-screen h1 { font-size: 24px; color: #1E3A5F; margin-bottom: 8px; }
.login-screen p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
.login-btn { background: #1E3A5F; color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.1s; }
.login-btn:active { transform: scale(0.97); }
.login-btn svg { width: 20px; height: 20px; }

/* Loading */
.loading { text-align: center; padding: 60px 24px; color: var(--muted); }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: #0891B2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Banner */
.banner { background: linear-gradient(135deg, #1E3A5F 0%, #0F766E 100%); color: white; border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; }
.banner h2 { font-size: 13px; opacity: 0.7; font-weight: 400; margin-bottom: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
.banner .date-big { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.banner .badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 4px 10px; border-radius: 99px; font-weight: 600; }
.badge-sob { background: #D97706; color: white; }
.badge-hvc { background: #0891B2; color: white; }
.badge-hvc-proj { background: #155E75; color: white; border: 1px dashed rgba(255,255,255,0.4); }
.badge-conflito { background: #DC2626; color: white; }
.badge-feriado { background: #10B981; color: white; }
.badge-livre { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }

/* Legend */
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; font-size: 10px; color: var(--muted); padding: 0 2px; }
.legend-item { display: flex; align-items: center; gap: 3px; }
.legend-sw { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* Filters */
.filters { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 2px; }
.filters::-webkit-scrollbar { display: none; }
.fbtn { border: 1px solid #D1D5DB; background: var(--card); padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.fbtn:active { transform: scale(0.95); }
.fbtn.active { background: #1E3A5F; color: white; border-color: #1E3A5F; }

/* Calendar */
.month-section { margin-bottom: 18px; }
.month-hdr { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #1E3A5F; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.mtag { font-size: 10px; background: var(--border); padding: 2px 6px; border-radius: 4px; font-weight: 500; color: var(--muted); }
.mtag.real { background: #CFFAFE; color: #0891B2; }
.cgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.chead { text-align: center; font-size: 10px; font-weight: 600; color: #9CA3AF; padding: 3px 0; }
.cday { min-height: 40px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; position: relative; background: var(--card); border: 1px solid #F3F4F6; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
.cday:active { transform: scale(0.92); }
.cday.empty { background: transparent; border-color: transparent; }
.cday.empty:active { transform: none; }
.cday .dn { font-weight: 600; line-height: 1; }
.cday .di { font-size: 8px; margin-top: 2px; line-height: 1; }

.cday.sob { background: #FEF3C7; border-color: #D97706; }
.cday.hvc { background: #CFFAFE; border-color: #0891B2; }
.cday.hvc-proj { background: #E0F2FE; border-color: #155E75; border-style: dashed; }
.cday.both { background: #EDE9FE; border-color: #7C3AED; }
.cday.both-proj { background: #EDE9FE; border-color: #7C3AED; border-style: dashed; }
.cday.conflict { background: #FEE2E2; border-color: #DC2626; border-width: 2px; }
.cday.hol-border { box-shadow: inset 0 0 0 2px #10B981; }
.cday.today { box-shadow: 0 0 0 2.5px #38BDF8, 0 0 10px rgba(56,189,248,0.35); z-index: 2; }
.cday.past { opacity: 0.45; }

/* Detail modal (bottom sheet) */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; display: none; opacity: 0; transition: opacity 0.2s; }
.overlay.visible { display: block; opacity: 1; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 16px 16px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px)); z-index: 101; transform: translateY(100%); transition: transform 0.3s ease; max-height: 60vh; overflow-y: auto; }
.sheet.visible { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 0 auto 14px; }
.sheet h3 { font-size: 16px; margin-bottom: 10px; }
.ditem { font-size: 13px; padding: 8px 0; border-bottom: 1px solid #F3F4F6; display: flex; align-items: flex-start; gap: 8px; }
.ditem:last-child { border-bottom: none; }
.dicon { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

/* Accordion */
.acc-toggle { background: #F3F4F6; border: none; width: 100%; text-align: left; padding: 10px 14px; font-size: 13px; font-weight: 600; border-radius: 10px; cursor: pointer; margin-bottom: 8px; color: #4B5563; }
.acc-content { display: none; }
.acc-content.open { display: block; }

/* Conflicts */
.cflict-list { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.cflict-list h3 { font-size: 14px; color: #DC2626; margin-bottom: 8px; }
.centry { font-size: 12px; padding: 6px 0; border-bottom: 1px solid #FECACA; line-height: 1.4; }
.centry:last-child { border-bottom: none; }

/* Income */
.income { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.income h3 { font-size: 15px; margin-bottom: 10px; color: #1E3A5F; }
.igrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.icard { background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; }
.icard .mn { font-size: 11px; color: var(--muted); font-weight: 500; }
.icard .amt { font-size: 15px; font-weight: 700; color: #059669; margin-top: 1px; }
.icard .sc { font-size: 10px; color: #9CA3AF; }
.itotal { margin-top: 10px; text-align: right; font-size: 17px; font-weight: 700; color: #059669; }

.note { font-size: 10px; color: #9CA3AF; text-align: center; margin-top: 6px; font-style: italic; }

/* Pull to refresh hint */
.refresh-hint { text-align: center; font-size: 11px; color: var(--muted); padding: 8px; cursor: pointer; }

for (var m = 3; m <= 12; m++) monthList.push([2026, m]);
monthList.push([2027, 1]); monthList.push([2027, 2]);

async function loadData() {
  var dash = document.getElementById('dashboard');
  dash.innerHTML = '<div class="loading"><div class="spinner"></div><br>Carregando Pega PlantÃ£o...</div>';

  try {
    var events = await fetchEvents();

      else if (sH >= 13 && eH <= 19) label = 'HVC Tarde';
      else label = 'HVC Tarde+Noturno';
      var hrs = pad2(sH) + 'h-' + pad2(eH) + 'h';
      if (HVC[key]) {
        HVC[key].label = 'HVC (mÃºltiplos)';

    for (var i = 1; i <= dim; i++) { var dw = new Date(ym[0], ym[1]-1, i).getDay(); if(!wc[dw]) wc[dw]=[]; wc[dw].push(i); }

  if (tHvc) h += '<span class="badge ' + (tHvc.source==='real'?'badge-hvc':'badge-hvc-proj') + '">' + tHvc.label + ' ' + tHvc.hours + (tHvc.source==='real'?' â':' â³') + '</span>';
  if (tHol) h += '<span class="badge badge-feriado">' + tHol + '</span>';
  if (!tSob&&!tHvc&&!tHol) h += '<span class="badge badge-livre">Dia livre</span>';
  h += '</div></div>';

  h += '<div class="note">Pega PlantÃ£o: ' + totalReal + ' eventos reais Â· Demais meses: projeÃ§Ã£o</div>';

  // Legend
  h += '<div class="legend">';
  h += '<div class="legend-item"><div class="legend-sw" style="background:#FEF3C7;border:1px solid #D97706"></div>Sob</div>';
  h += '<div class="legend-item"><div class="legend-sw" style="background:#CFFAFE;border:1px solid #0891B2"></div>HVC â</div>';
  h += '<div class="legend-item"><div class="legend-sw" style="background:#E0F2FE;border:1px dashed #155E75"></div>HVC â³</div>';
  h += '<div class="legend-item"><div class="legend-sw" style="background:#EDE9FE;border:1px solid #7C3AED"></div>Ambos</div>';
  h += '<div class="legend-item"><div class="legend-sw" style="background:#FEE2E2;border:2px solid #DC2626"></div>Conflito</div>';
  h += '<div class="legend-item"><div class="legend-sw" style="background:white;box-shadow:inset 0 0 0 2px #10B981"></div>Feriado</div>';
  h += '</div>';

  // Filters
  var fs = [{id:'all',l:'Todos'},{id:'sob',l:'Sobreaviso'},{id:'hvc',l:'HVC'},{id:'hol',l:'Feriados'},{id:'conf',l:'Conflitos ('+CONFLICTS.length+')'}];
  h += '<div class="filters">';
  fs.forEach(function(f) { h += '<button class="fbtn' + (activeFilter===f.id?' active':'') + '" data-f="'+f.id+'">' + f.l + '</button>'; });
  h += '</div>';

  // Months
  var cur = [], past = [];
  var tYM = new Date().getFullYear()*100 + new Date().getMonth()+1;
  monthList.forEach(function(ym) { if (ym[0]*100+ym[1] < tYM) past.push(ym); else cur.push(ym); });

  if (past.length) {
    h += '<button class="acc-toggle" data-acc="p">ð Meses anteriores (' + past.length + ')</button>';
    h += '<div class="acc-content" id="acc-p">';
    past.forEach(function(ym) { h += renderMonth(ym[0], ym[1]); });
    h += '</div>';
  }
  cur.forEach(function(ym) { h += renderMonth(ym[0], ym[1]); });

  // Conflicts
  if (CONFLICTS.length) {
    h += '<div class="cflict-list"><h3>â  Conflitos (' + CONFLICTS.length + ')</h3>';
    CONFLICTS.forEach(function(c) {
      h += '<div class="centry"><strong>' + fmtBR(c.date) + '</strong> (' + wdName(c.date) + ') â Sob ' + c.sobH + ' Ã ' + c.hvcL + ' ' + c.hvcH + ' <span style="color:#9CA3AF">[' + (c.src==='real'?'â':'â³') + ']</span></div>';
    });
    h += '</div>';
  }

  // Income
  h += '<div class="income"><h3>ð° ProduÃ§Ã£o HVC</h3><p style="font-size:11px;color:#9CA3AF;margin-bottom:8px">R$ 1.600/plantÃ£o</p><div class="igrid">';
  var gt = 0;
  monthList.forEach(function(ym) {
    var cnt = 0, ymK = ym[0]+'-'+pad2(ym[1]), isR = !!realMonths[ymK];
    var dim = new Date(ym[0],ym[1],0).getDate();
    for (var d=1;d<=dim;d++) { var k=dk(ym[0],ym[1],d); if(HVC[k]) cnt+=(HVC[k].eventCount||1); }
    var amt = cnt*1600; gt += amt;
    h += '<div class="icard"><div class="mn">' + MONTHS_PT[ym[1]].substring(0,3) + '/' + String(ym[0]).substring(2) + (isR?' â':' â³') + '</div>';
    h += '<div class="amt">R$ ' + amt.toLocaleString('pt-BR') + '</div><div class="sc">' + cnt + ' plt</div></div>';
  });
  h += '</div><div class="itotal">Total: R$ ' + gt.toLocaleString('pt-BR') + '</div></div>';

  h += '<div class="refresh-hint" id="refresh-btn">â» Atualizar dados</div>';

  document.getElementById('dashboard').innerHTML = h;
  bindEvents();
}

function renderMonth(y, m) {
  var mN = MONTHS_PT[m] + ' ' + y;
  var ymK = y+'-'+pad2(m), isR = !!realMonths[ymK];
  if (y===2026&&m===10) mN += ' (FÃRIAS)';
  var fd = new Date(y,m-1,1), dim = new Date(y,m,0).getDate();
  var off = (fd.getDay()+6)%7;
  var sc=0, hc=0, ec=0;
  for (var i=1;i<=dim;i++) { var k=dk(y,m,i); if(SOBREAVISOS[k])sc++; if(HVC[k]){hc++;ec+=(HVC[k].eventCount||1);} }

  var h = '<div class="month-section"><div class="month-hdr">' + mN;
  h += isR ? ' <span class="mtag real">â '+ec+' plt</span>' : ' <span class="mtag">â³ '+hc+' plt</span>';
  h += ' <span class="mtag">'+sc+' sob</span></div><div class="cgrid">';
  WD_SHORT.forEach(function(w){h+='<div class="chead">'+w+'</div>';});
  for(var s=0;s<off;s++) h+='<div class="cday empty"></div>';

  for(var d=1;d<=dim;d++){
    var key=dk(y,m,d), sob=SOBREAVISOS[key], hvc=HVC[key], hol=FERIADOS[key];
    var con=CONFLICTS.find(function(c){return c.date===key;});
    var isPast=key<tKey, isT=key===tKey;
    var vis=true;
    if(activeFilter==='sob'&&!sob)vis=false;
    if(activeFilter==='hvc'&&!hvc)vis=false;
    if(activeFilter==='hol'&&!hol)vis=false;
    if(activeFilter==='conf'&&!con)vis=false;
    if(!vis){h+='<div class="cday empty"><span class="dn" style="opacity:.15">'+d+'</span></div>';continue;}

    var cls='cday';
    if(con)cls+=' conflict';
    else if(sob&&hvc)cls+=(hvc.source==='real'?' both':' both-proj');
    else if(sob)cls+=' sob';
    else if(hvc)cls+=(hvc.source==='real'?' hvc':' hvc-proj');
    if(hol)cls+=' hol-border';
    if(isT)cls+=' today';
    if(isPast)cls+=' past';

    var ic='';
    if(con)ic='â '; else{if(sob)ic+='ð ';if(hvc)ic+=(hvc.source==='real'?'ðµ':'â³');}
    if(hol)ic+='ð¢';

    h+='<div class="'+cls+'" data-day="'+key+'"><span class="dn">'+d+'</span>';
    if(ic)h+='<div class="di">'+ic+'</div>';
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

// ============ INTERACTIONS ============
function bindEvents() {
  document.querySelectorAll('.fbtn').forEach(function(b) {
    b.addEventListener('click', function() { activeFilter=this.getAttribute('data-f'); render(); });
  });
  document.querySelectorAll('[data-acc]').forEach(function(b) {
    b.addEventListener('click', function() {
      var c=document.getElementById('acc-'+this.getAttribute('data-acc'));
      c.classList.toggle('open');
      this.textContent=c.classList.contains('open')?'ð Fechar':'ð Meses anteriores';
    });
  });
  document.querySelectorAll('[data-day]').forEach(function(el) {
    el.addEventListener('click', function() { showSheet(this.getAttribute('data-day')); });
  });
  var rb = document.getElementById('refresh-btn');
  if (rb) rb.addEventListener('click', function() { HVC={}; realMonths={}; totalReal=0; CONFLICTS=[]; loadData(); });
}

function showSheet(key) {
  var sob=SOBREAVISOS[key], hvc=HVC[key], hol=FERIADOS[key];
  var con=CONFLICTS.find(function(c){return c.date===key;});
  if(!sob&&!hvc&&!hol)return;

  var h='<h3>'+wdName(key)+', '+fmtBR(key)+'</h3>';
  if(hol) h+='<div class="ditem"><div class="dicon" style="background:#10B981"></div>ð '+hol+'</div>';
  if(sob){
    var dw=new Date(key+'T12:00:00').getDay();
    var sd=sob.t==='partial'?'Sobreaviso parcial ('+sob.h+')':(dw===0||dw===6?'Sobreaviso 24h':'Sobreaviso noturno (19h-7h)');
    h+='<div class="ditem"><div class="dicon" style="background:#D97706"></div>'+sd+'<br><span style="color:#9CA3AF;font-size:11px">Planilha UNICAMP</span></div>';
  }
  if(hvc){
    var st=hvc.source==='real'?'â Pega PlantÃ£o':'â³ ProjeÃ§Ã£o';
    h+='<div class="ditem"><div class="dicon" style="background:'+(hvc.source==='real'?'#0891B2':'#155E75')+'"></div>'+hvc.label+' ('+hvc.hours+')<br><span style="color:#9CA3AF;font-size:11px">'+st+'</span></div>';
    if(hvc.eventCount>1) h+='<div class="ditem" style="color:#9CA3AF;padding-left:16px">'+hvc.eventCount+' turnos neste dia</div>';
  }
  if(con) h+='<div class="ditem" style="color:#DC2626;font-weight:600"><div class="dicon" style="background:#DC2626"></div>â  Sobreaviso '+con.sobH+' Ã '+con.hvcL+' '+con.hvcH+'</div>';

  document.getElementById('sheet-content').innerHTML = h;
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('sheet').classList.add('visible');
}

document.getElementById('overlay').addEventListener('click', closeSheet);
function closeSheet() {
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('sheet').classList.remove('visible');
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

loadGsi();
</script>
